tools:
  - name: build_layered_comp
    description: Replace the current graph with a typed multi-file or multilayer-EXR comp and save the .nk script.
    input_schema:
      type: object
      required: [manifest]
      properties:
        manifest:
          type: object
          required: [script_path, output_path, layers]
          properties:
            script_path: {type: string}
            output_path: {type: string}
            first_frame: {type: integer, minimum: 0, default: 1}
            last_frame: {type: integer, minimum: 0, default: 1}
            width: {type: integer, minimum: 1, default: 1920}
            height: {type: integer, minimum: 1, default: 1080}
            fps: {type: number, exclusiveMinimum: 0, default: 30}
            required_layers:
              type: array
              uniqueItems: true
              items: {type: string, minLength: 1}
              description: EXR layer prefixes that must exist before the graph is saved.
            output_colorspace: {type: string, minLength: 1}
            output_datatype: {type: string, minLength: 1}
            layers:
              type: array
              minItems: 1
              items:
                type: object
                required: [path]
                properties:
                  name: {type: string}
                  path: {type: string}
                  channel: {type: string, minLength: 1, description: Optional EXR layer to extract with Shuffle.}
                  operation: {type: string, enum: [over, plus, multiply, screen, max, min], default: over}
                  colorspace: {type: string}
                  gain: {type: number, minimum: 0, default: 1}
                  blur_size: {type: number, minimum: 0, default: 0}
                  adjustments:
                    type: array
                    description: Ordered typed operations; do not combine with non-default gain or blur_size.
                    items:
                      type: object
                      required: [kind]
                      properties:
                        kind: {type: string, enum: [grade, material_gain, blur]}
                        name: {type: string, minLength: 1}
                        gain: {type: number, minimum: 0, default: 1}
                        gamma: {type: number, exclusiveMinimum: 0, default: 1}
                        size: {type: number, minimum: 0, default: 0}
                        crypto_layer: {type: string, minLength: 1}
                        materials:
                          type: array
                          minItems: 1
                          items: {type: string, minLength: 1}
    read_only: false
    destructive: true
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    source_file: scripts/build_layered_comp.py
  - name: render_write_node
    description: Render an explicit Nuke Write node over an inclusive frame range.
    input_schema:
      type: object
      required: [write_node, first_frame, last_frame]
      properties:
        write_node: {type: string}
        first_frame: {type: integer, minimum: 0}
        last_frame: {type: integer, minimum: 0}
        step: {type: integer, minimum: 1, default: 1}
    read_only: false
    destructive: true
    idempotent: true
    execution: async
    affinity: main
    timeout_hint_secs: 7200
    source_file: scripts/render_write_node.py
