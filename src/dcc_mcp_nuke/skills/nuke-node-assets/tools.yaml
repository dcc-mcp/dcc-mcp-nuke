tools:
  - name: package_gizmo
    description: >-
      Collapse explicit nodes into a Group, expose selected internal knobs,
      attach version metadata, and save the Group as a reusable .gizmo file.
    input_schema:
      type: object
      required: [node_names, gizmo_name, output_path]
      properties:
        node_names:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, minLength: 1}
        gizmo_name:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9_]*$"
        output_path:
          type: string
          description: Absolute destination path ending in .gizmo.
        version:
          type: string
          minLength: 1
          default: "1.0.0"
        exposed_knobs:
          type: array
          default: []
          items:
            type: object
            required: [name, target_node, target_knob]
            properties:
              name: {type: string, pattern: "^[A-Za-z][A-Za-z0-9_]*$"}
              label: {type: string}
              target_node: {type: string, minLength: 1}
              target_knob: {type: string, minLength: 1}
            additionalProperties: false
        overwrite:
          type: boolean
          default: false
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/package_gizmo.py

  - name: instantiate_gizmo
    description: Load a .gizmo file, create an instance, and set public knob values.
    input_schema:
      type: object
      required: [gizmo_path]
      properties:
        gizmo_path:
          type: string
          description: Absolute path to an existing .gizmo file.
        node_name:
          type: string
          pattern: "^[A-Za-z][A-Za-z0-9_]*$"
        knob_values:
          type: object
          default: {}
          additionalProperties: true
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/instantiate_gizmo.py

  - name: inspect_gizmo
    description: Inspect a Gizmo instance manifest, exposed knobs, child nodes, and error state.
    input_schema:
      type: object
      required: [node_name]
      properties:
        node_name: {type: string, minLength: 1}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 30
    source_file: scripts/inspect_gizmo.py
